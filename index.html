<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garmin Heart Beat Replay</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: white; font-family: sans-serif; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 15px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); width: 280px; }
        #bpm-display { font-size: 80px; font-weight: 800; line-height: 1; margin: 10px 0; }
        #status { font-size: 12px; text-transform: uppercase; color: #ffcc00; margin-bottom: 5px; }
        .error { color: #ff4444 !important; font-weight: bold; }
        .control-group { margin-bottom: 15px; }
        label { font-size: 11px; color: #aaa; display: block; margin-bottom: 5px; }
        input[type="range"] { width: 100%; cursor: pointer; }
        #summary { margin-top: 15px; display: none; border-top: 1px solid #444; padding-top: 10px; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="status">Upload GPX to Start</div>
        
        <div class="control-group">
            <label>1. CHOOSE FILE</label>
            <input type="file" id="gpxInput" accept=".gpx">
        </div>

        <div class="control-group">
            <label>2. REPLAY SPEED: <span id="speedValue">5</span>x</label>
            <input type="range" id="speedSlider" min="1" max="50" value="5">
        </div>
        
        <div id="bpm-display">--</div>
        <div id="zone-label">Standing By</div>

        <div id="summary">
            <p style="font-size: 11px; color: #888;">WORKOUT STATS</p>
            <div id="zone-stats" style="font-size: 13px;"></div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. 3D SCENE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const heartShape = new THREE.Shape();
        heartShape.moveTo(5, 5);
        heartShape.bezierCurveTo(5, 5, 4, 0, 0, 0);
        heartShape.bezierCurveTo(-6, 0, -6, 7, -6, 7);
        heartShape.bezierCurveTo(-6, 11, -3, 15.4, 5, 19);
        heartShape.bezierCurveTo(12, 15.4, 16, 11, 16, 7);
        heartShape.bezierCurveTo(16, 7, 16, 0, 10, 0);
        heartShape.bezierCurveTo(7, 0, 5, 5, 5, 5);

        const geometry = new THREE.ExtrudeGeometry(heartShape, { depth: 2, bevelEnabled: true });
        const material = new THREE.MeshPhongMaterial({ color: 0x444444, shininess: 80 });
        const heartMesh = new THREE.Mesh(geometry, material);
        heartMesh.scale.set(0.4, 0.4, 0.4);
        heartMesh.rotation.z = Math.PI;
        scene.add(heartMesh);

        const light = new THREE.PointLight(0xffffff, 600);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        camera.position.z = 25;

        // --- 2. LOGIC & CONTROLS ---
        let rotationSpeed = 0.005;
        let replaySpeed = 5;
        let maxHR = 0;
        let isReplaying = false;

        const ui = {
            status: document.getElementById('status'),
            bpm: document.getElementById('bpm-display'),
            zone: document.getElementById('zone-label'),
            stats: document.getElementById('zone-stats'),
            summary: document.getElementById('summary'),
            speedValue: document.getElementById('speedValue'),
            speedSlider: document.getElementById('speedSlider')
        };

        ui.speedSlider.addEventListener('input', (e) => {
            replaySpeed = e.target.value;
            ui.speedValue.innerText = replaySpeed;
        });

        document.getElementById('gpxInput').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (event) => startReplay(event.target.result);
            reader.readAsText(e.target.files[0]);
        });

        async function startReplay(xmlString) {
            if (isReplaying) return; // Prevent double playback
            isReplaying = true;
            maxHR = 0;

            const parser = new DOMParser();
            const xml = parser.parseFromString(xmlString, "text/xml");
            const points = Array.from(xml.querySelectorAll('trkpt'));
            
            // Check for HR tags using a selector that handles namespaces (gpxdata, gpxtpx, or plain hr)
            const hasHR = points.some(pt => pt.innerHTML.includes('hr>'));

            if (!hasHR) {
                ui.status.innerText = "ERROR: NO HR DATA";
                ui.status.className = "error";
                isReplaying = false;
                return;
            }

            ui.status.innerText = "Replaying...";
            ui.status.className = "";
            ui.summary.style.display = "none";

            for (let i = 0; i < points.length; i++) {
                // Find HR using TagName to be most compatible with your RideWithGPS file
                let hrVal = null;
                const extensions = points[i].getElementsByTagName('extensions')[0];
                if (extensions) {
                    const hrTags = extensions.querySelectorAll('*');
                    for (let tag of hrTags) {
                        if (tag.tagName.toLowerCase().includes('hr')) {
                            hrVal = parseInt(tag.textContent);
                            break;
                        }
                    }
                }

                if (hrVal) {
                    if (hrVal > maxHR) maxHR = hrVal;
                    updateHeart(hrVal);
                }

                if (i < points.length - 1) {
                    const t1 = new Date(points[i].querySelector('time').textContent);
                    const t2 = new Date(points[i+1].querySelector('time').textContent);
                    const diff = Math.max(t2 - t1, 0);
                    // Use the dynamic replaySpeed value
                    await new Promise(r => setTimeout(r, diff / replaySpeed));
                }
            }
            ui.status.innerText = "Finished";
            ui.summary.style.display = "block";
            ui.stats.innerHTML = `Peak Heart Rate: <b>${maxHR} BPM</b>`;
            isReplaying = false;
        }

        function updateHeart(bpm) {
            ui.bpm.innerText = bpm;
            let color = 0x3498db; 
            if (bpm > 100) color = 0x2ecc71; 
            if (bpm > 145) color = 0xe74c3c; 

            heartMesh.material.color.setHex(color);
            ui.bpm.style.color = `#${color.toString(16).padStart(6, '0')}`;
            rotationSpeed = 0.005 + (bpm / 3000);
            
            heartMesh.scale.set(0.48, 0.48, 0.48);
            setTimeout(() => heartMesh.scale.set(0.4, 0.4, 0.4), 100);
        }

        function animate() {
            requestAnimationFrame(animate);
            heartMesh.rotation.y += rotationSpeed;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>

        animate();
    </script>
</body>
</html>
