<head>

    <title>Anatomical Heart Visualizer</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0, 0, 0, 0.85); padding: 25px; border-radius: 12px; border: 1px solid #440000; width: 280px; box-shadow: 0 0 20px rgba(255,0,0,0.2); }
        #bpm-display { font-size: 72px; font-weight: 900; color: #ff3333; margin: 10px 0; text-shadow: 0 0 15px rgba(255,0,0,0.5); }
        .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 12px; cursor: pointer; background: #200; border: 1px solid #ff3333; color: white; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        button:hover:not(:disabled) { background: #500; }
        button:disabled { opacity: 0.2; cursor: not-allowed; border-color: #444; }
        input[type="range"] { width: 100%; accent-color: #ff3333; cursor: pointer; }
        label { font-size: 10px; color: #888; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        #status { font-size: 11px; color: #ff8888; margin-bottom: 10px; border-bottom: 1px solid #300; padding-bottom: 5px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; transition: background 0.1s; z-index: 1; }
    </style>
</head>
