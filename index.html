<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync'd Anatomical Heart</title>
    <style>
        body { margin: 0; background: #050000; color: white; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(20, 0, 0, 0.85); padding: 25px; border-radius: 10px; border: 1px solid #440000; width: 300px; }
        #bpm-display { font-size: 70px; font-weight: 900; color: #ff3333; margin: 10px 0; text-shadow: 0 0 15px rgba(255,0,0,0.5); }
        .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 10px; cursor: pointer; background: #330000; border: 1px solid #ff3333; color: white; font-weight: bold; text-transform: uppercase; }
        button:hover { background: #660000; }
        .control-group { margin-bottom: 15px; }
        label { font-size: 10px; color: #aa8888; display: block; margin-bottom: 5px; }
        input[type="range"] { width: 100%; accent-color: #ff3333; }
        #zone-label { font-size: 14px; letter-spacing: 2px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="status" style="color:#ff8888; font-size:12px; margin-bottom:10px;">SYSTEM READY</div>
        <div class="control-group"><label>DATA SOURCE (.GPX)</label><input type="file" id="gpxInput" accept=".gpx"></div>
        <div class="btn-row">
            <button id="playBtn" disabled>Play</button>
            <button id="pauseBtn" disabled>Pause</button>
        </div>
        <div class="control-group">
            <label>REPLAY SPEED: <span id="speedValue">10</span>x</label>
            <input type="range" id="speedSlider" min="1" max="100" value="10">
        </div>
        <div id="bpm-display">--</div>
        <div id="zone-label">AWAITING SIGNAL</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. SCENE & ANATOMICAL MODEL ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const heartGroup = new THREE.Group();
        const material = new THREE.MeshPhongMaterial({ color: 0x990000, shininess: 50, specular: 0xff0000 });

        const ventricle = new THREE.Mesh(new THREE.SphereGeometry(7, 32, 32), material);
        ventricle.scale.set(1, 1.3, 0.8);
        heartGroup.add(ventricle);

        const aorta = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 8, 16), material);
        aorta.position.set(2, 6, -1); aorta.rotation.z = -0.3;
        heartGroup.add(aorta);

        scene.add(heartGroup);
        const light = new THREE.PointLight(0xffffff, 800); light.position.set(10, 15, 10); scene.add(light);
        scene.add(new THREE.AmbientLight(0x220000, 2));
        camera.position.z = 25;

        // --- 2. DATA & ANIMATION STATE ---
        let replaySpeed = 10;
        let isPaused = true;
        let currentIdx = 0;
        let points = [];
        let heartCycleInterval = null;

        const ui = {
            play: document.getElementById('playBtn'),
            pause: document.getElementById('pauseBtn'),
            speed: document.getElementById('speedSlider'),
            speedVal: document.getElementById('speedValue'),
            bpm: document.getElementById('bpm-display'),
            status: document.getElementById('status'),
            zone: document.getElementById('zone-label')
        };

        ui.speed.oninput = (e) => { 
            replaySpeed = e.target.value; 
            ui.speedVal.innerText = replaySpeed; 
        };

        document.getElementById('gpxInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const xml = new DOMParser().parseFromString(event.target.result, "text/xml");
                points = Array.from(xml.querySelectorAll('trkpt'));
                ui.play.disabled = false;
                ui.status.innerText = "LOADED: " + points.length + " PTS";
            };
            reader.readAsText(e.target.files[0]);
        };

        ui.play.onclick = () => { isPaused = false; ui.play.disabled = true; ui.pause.disabled = false; runReplay(); };
        ui.pause.onclick = () => { isPaused = true; ui.play.disabled = false; ui.pause.disabled = true; stopHeart(); };

        async function runReplay() {
            while (currentIdx < points.length && !isPaused) {
                const pt = points[currentIdx];
                const hrTag = pt.getElementsByTagNameNS("*", "hr")[0] || pt.querySelector('hr');
                
                if (hrTag) {
                    const bpm = parseInt(hrTag.textContent);
                    startHeartSync(bpm);
                }

                const t1 = new Date(points[currentIdx].querySelector('time').textContent);
                const t2 = (currentIdx < points.length - 1) ? new Date(points[currentIdx+1].querySelector('time').textContent) : t1;
                const delay = Math.max(t2 - t1, 0);
                await new Promise(r => setTimeout(r, delay / replaySpeed));
                currentIdx++;
            }
        }

        // --- 3. THE SYNCHRONIZED BEAT LOGIC ---
        function startHeartSync(bpm) {
            ui.bpm.innerText = bpm;
            stopHeart(); // Clear existing beat cycle

            const msPerBeat = (60 / bpm) * 1000;
            
            // Set the "Lub-Dub" cycle
            heartCycleInterval = setInterval(() => {
                // 1. LUB (Atria)
                heartGroup.scale.set(1.08, 1.08, 1.08);
                
                setTimeout(() => {
                    // 2. DUB (Ventricle - The big thump)
                    heartGroup.scale.set(1.2, 1.2, 1.2);
                    setTimeout(() => {
                        heartGroup.scale.set(1.0, 1.0, 1.0);
                    }, msPerBeat * 0.2); // Reset after 20% of the beat duration
                }, msPerBeat * 0.15); // Stagger by 15% of the beat duration
                
            }, msPerBeat);

            // Update Color/Label
            let color = 0x660000;
            if (bpm > 100) { color = 0xaa0000; ui.zone.innerText = "ACTIVE"; }
            else { ui.zone.innerText = "RESTING"; }
            if (bpm > 150) { color = 0xff0000; ui.zone.innerText = "PEAK"; }
            material.color.setHex(color);
        }

        function stopHeart() {
            if (heartCycleInterval) clearInterval(heartCycleInterval);
            heartGroup.scale.set(1, 1, 1);
        }

        function animate() {
            requestAnimationFrame(animate);
            heartGroup.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
