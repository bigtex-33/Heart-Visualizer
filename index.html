<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomical Heart Visualizer</title>
    <style>
        body { margin: 0; background: #050000; color: white; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(20, 0, 0, 0.8); padding: 25px; border-radius: 10px; border: 1px solid #440000; width: 300px; box-shadow: 0 0 20px rgba(255,0,0,0.2); }
        #bpm-display { font-size: 70px; font-weight: 900; color: #ff3333; margin: 10px 0; text-shadow: 0 0 15px rgba(255,0,0,0.5); }
        .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 10px; cursor: pointer; background: #330000; border: 1px solid #ff3333; color: white; font-weight: bold; text-transform: uppercase; }
        button:hover { background: #660000; }
        button:disabled { border-color: #333; color: #555; cursor: not-allowed; }
        .control-group { margin-bottom: 15px; }
        label { font-size: 10px; color: #aa8888; display: block; margin-bottom: 5px; }
        input[type="range"] { width: 100%; accent-color: #ff3333; }
        #summary { margin-top: 20px; border-top: 1px solid #440000; padding-top: 10px; display: none; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="status" style="color:#ff8888; font-size:12px; margin-bottom:10px;">SYSTEM READY</div>
        
        <div class="control-group">
            <label>DATA SOURCE (.GPX)</label>
            <input type="file" id="gpxInput" accept=".gpx">
        </div>

        <div class="btn-row">
            <button id="playBtn" disabled>Play</button>
            <button id="pauseBtn" disabled>Pause</button>
        </div>

        <div class="control-group">
            <label>TEMPORAL SPEED: <span id="speedValue">10</span>x</label>
            <input type="range" id="speedSlider" min="1" max="100" value="10">
        </div>
        
        <div id="bpm-display">--</div>
        <div id="zone-label" style="font-size:14px; letter-spacing:2px;">AWAITING SIGNAL</div>

        <div id="summary">
            <div id="zone-stats" style="font-size: 14px; color: #00ff88;"></div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. THE ANATOMICAL MODEL ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Creating a more anatomical "bulbed" geometry
        const heartGroup = new THREE.Group();
        const bodyGeom = new THREE.SphereGeometry(7, 32, 32);
        const material = new THREE.MeshPhongMaterial({ 
            color: 0x990000, 
            shininess: 50, 
            specular: 0xff0000,
            flatShading: false 
        });

        const ventricle = new THREE.Mesh(bodyGeom, material);
        ventricle.scale.set(1, 1.3, 0.8);
        heartGroup.add(ventricle);

        // Adding "Aorta/Vessels" for anatomical feel
        const vesselGeom = new THREE.CylinderGeometry(1.5, 1.5, 8, 16);
        const aorta = new THREE.Mesh(vesselGeom, material);
        aorta.position.set(2, 6, -1);
        aorta.rotation.z = -0.3;
        heartGroup.add(aorta);

        scene.add(heartGroup);

        const light1 = new THREE.PointLight(0xffffff, 800);
        light1.position.set(10, 15, 10);
        scene.add(light1);
        const fillLight = new THREE.AmbientLight(0x220000, 2);
        scene.add(fillLight);
        camera.position.z = 25;

        // --- 2. APP STATE & CONTROLS ---
        let replaySpeed = 10;
        let isPaused = false;
        let currentIdx = 0;
        let points = [];
        let maxHR = 0;

        const ui = {
            play: document.getElementById('playBtn'),
            pause: document.getElementById('pauseBtn'),
            speed: document.getElementById('speedSlider'),
            speedVal: document.getElementById('speedValue'),
            bpm: document.getElementById('bpm-display'),
            status: document.getElementById('status'),
            stats: document.getElementById('zone-stats'),
            summary: document.getElementById('summary'),
            zone: document.getElementById('zone-label')
        };

        ui.speed.oninput = (e) => { 
            replaySpeed = e.target.value; 
            ui.speedVal.innerText = replaySpeed; 
        };

        document.getElementById('gpxInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const parser = new DOMParser();
                const xml = parser.parseFromString(event.target.result, "text/xml");
                points = Array.from(xml.querySelectorAll('trkpt'));
                ui.play.disabled = false;
                ui.status.innerText = "DATA LOADED: " + points.length + " PTS";
            };
            reader.readAsText(e.target.files[0]);
        };

        ui.play.onclick = () => { isPaused = false; ui.play.disabled = true; ui.pause.disabled = false; runReplay(); };
        ui.pause.onclick = () => { isPaused = true; ui.play.disabled = false; ui.pause.disabled = true; ui.status.innerText = "PAUSED"; };

        async function runReplay() {
            ui.status.innerText = "REPLAY ACTIVE";
            ui.summary.style.display = 'none';

            while (currentIdx < points.length && !isPaused) {
                const pt = points[currentIdx];
                const hrTag = pt.getElementsByTagNameNS("*", "hr")[0] || pt.querySelector('hr');
                
                if (hrTag) {
                    const bpm = parseInt(hrTag.textContent);
                    if (bpm > maxHR) maxHR = bpm;
                    updateVisuals(bpm);
                }

                if (currentIdx < points.length - 1) {
                    const t1 = new Date(points[currentIdx].querySelector('time').textContent);
                    const t2 = new Date(points[currentIdx + 1].querySelector('time').textContent);
                    const delay = Math.max(t2 - t1, 0);
                    await new Promise(r => setTimeout(r, delay / replaySpeed));
                }
                currentIdx++;
            }

            if (currentIdx >= points.length) {
                ui.status.innerText = "SEQUENCE END";
                ui.summary.style.display = 'block';
                ui.stats.innerText = `PEAK PULSE: ${maxHR} BPM`;
                currentIdx = 0; // Reset for next run
            }
        }

        // --- 3. THE "LUB-DUB" ANIMATION ---
        function updateVisuals(bpm) {
            ui.bpm.innerText = bpm;
            let color = 0x660000;
            if (bpm > 100) color = 0xaa0000;
            if (bpm > 150) color = 0xff0000;

            material.color.setHex(color);

            // Lub-Dub: A real heart has two distinct contractions
            // 1. The "Lub" (Atria)
            heartGroup.scale.set(1.1, 1.1, 1.1);
            
            setTimeout(() => {
                // 2. The "Dub" (Ventricles - stronger)
                heartGroup.scale.set(1.25, 1.25, 1.25);
                setTimeout(() => {
                    heartGroup.scale.set(1.0, 1.0, 1.0);
                }, 100);
            }, 150);
        }

        function animate() {
            requestAnimationFrame(animate);
            heartGroup.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };

        animate();
    </script>
</body>
</html>
